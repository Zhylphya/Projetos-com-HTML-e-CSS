<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/projetos (1)/Culturama/culturama-favico.png" type="image/png">
    <title>Pesquisa Culturama</title>
    <link rel="stylesheet" href="/Culturama/css/style.css">
</head>
<body>
    <header>
        <img src="/Culturama/img/logo-culturama.png" alt="logo culturama">
        <h1>Pesquisa Online</h1>
    </header>
    <main>
        <section>
            <form action="sucesso.html" method="get">
                <fieldset>

                    <legend>Dados Pessoais</legend>
                    <label for="name">Nome</label>
                    <input id="name" type="text" name="userName" required>

                    <label for="userAge">Idade</label>
                    <input id="userAge" type="number" name="userAge" min="12" max="100" required>

                    <label for="bithDate">Data de Nascimento</label>
                    <input id="bithDate" type="date" name="birthDate" required>

                    <label for="userEmail">Email</label>
                    <input id="userEmail" type="email" name="userEmail" required>

                    <label for="userPhoneNumber">Telefone</label>
                    <input id="userPhoneNumber" type="tel" name="userPhoneNumber" required pattern="[0-9]{11}" placeholder="12345678912" aria-describedby="phoneHelp">
                    <small>Preencha com 11 dígitos no formato: ddd + número sem espaços ou hífen</small>
                    <br>

                    <label for="userImage">Upload de Foto</label>
                    <input id="userImage" type="file" accept="image/*" name="userImage" aria-describedby="image">
                    <small>Envie uma foto no formato PNG ou JPEG</small>
                </fieldset>

                <fieldset>
                    <legend>Perfil</legend>

                    <p>Gênero:</p>
                    <input id="userGender" type="radio" name="userGender" value="Feminino">
                    <label for="userGender">Feminino</label>

                    <input id="userGenderM" type="radio" name="userGender" value="Masculino">
                    <label for="userGenderM">Masculino</label>

                    <input id="notInformed" type="radio" name="userGender" value="notInformed">
                    <label for="notInformed">Prefiro Não Informar</label>
                    <br>

                    <label for="maritalStatus">Estado Civil</label>
                    <select id="maritalStatus" name="maritalStatus">
                        <option value="notSelected">Selecione</option>
                        <option value="casado">Casado</option>
                        <option value="solteiro">Solteiro</option>
                        <option value="divorciado">Divorciado</option>
                        <option value="uniaoEstavel">União Estável</option>
                    </select>
                        
                    <label for="userState">Estados</label>
                    <select id="userState" name="userState" required>
                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapa">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceara">Ceará</option>
                        <option value="distritoFederal">Distrito Federal</option>
                        <option value="espiritoSanto">Espirito Santo</option>
                        <option value="goias">Goiás</option>
                        <option value="maranhao">Maranhão</option>
                        <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                        <option value="matoGrosso">Mato Grosso</option>
                        <option value="minasGerais">Minas Gerais</option>
                        <option value="para">Pará</option>
                        <option value="paraiba">Paraíba</option>
                        <option value="parana">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piaui">Piauí</option>
                        <option value="rioDeJaneiro">Rio de Janeiro</option>
                        <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                        <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                        <option value="rondonia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santaCatarina">Santa Catarina</option>
                        <option value="ssoPaulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>

                    <label for="text" name="userCity">Cidade:</label>
                    <input id="text" name="userCity">
                    
                </fieldset>

                <fieldset>

                    <legend>Hábitos</legend>

                    <p>Redes Sociais:</p>
                    <input id="social" type="checkbox" name="social" value="instagram">
                    <label for="social">instagram</label>
                    <input id="facebook" type="checkbox" name="social" value="facebook">
                    <label for="facebook">Facebook</label>
                    <input id="x" type="checkbox" name="x" value="x">
                    <label for="x">x</label>
                    <input id="linkedin" type="checkbox" name="linkedin" value="linkedin">
                    <label for="linkedin">Linkedin</label>
                    <br>

                    <label for="musicStyle">Estilo Musical:</label>
                    <input list="styleTypes" id="musicStyle" name="muserMusicStyle" type="text">
                    <datalist id="styleTypes">
                        <option value="rock">
                        <option value="pop">
                        <option value="samba">
                        <option value="mpb">
                    </datalist>

                    <label for="colour">Cor Favorita:</label>
                    <input type="color" name="color" id="colour">

                </fieldset>

                <fieldset>
                    <legend>Opinião</legend>

                    <p>Escolha uma opção:</p>
                    <input type="radio" id="otima" name="satisfaction" value="otima" >
                    <label for="otima">excelente</label>
                    <input type="radio" id="good" name="satisfaction" value="bom">
                    <label for="good">bom</label>
                    <input type="radio" id="bad" name="satisfaction" value="ruim">
                    <label for="bad">ruim</label>
                    <input type="radio" id="worst" name="satisfaction" value="pessima">
                    <label for="worst">péssima</label>
                    <br>

                    <label for="longText">Opinião:</label>
                    <textarea id="longText" name="mensagem" placeholder="Deixe seu comentário..."></textarea>
                
                </fieldset>
             
                <fieldset>

                    <legend>Confirmações</legend>

                    <input type="checkbox" name="userLgpd" id="userLgpdterm" value="confirmed" required>
                    <label for="userLgpdterm">Eu aceito participar da pesquisa</label>
                    <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                    <label for="getResult">Desejo receber o resultado por email</label>

                </fieldset>
                <section class="botao">
                    <button type="reset" aria-label="limpar dados do forms">Limpar</button>
                    <button type="submit" aria-label="enviar dados do forms">Enviar</button>
                </section>
            </form>

        </section>
    
    </main>
</body>
</html>
